<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blackjack</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <header class="titulo">BlackJack Game</header>

    <div class="row mt-2">
      <div id="div-btn" class="col text-center">
        <button id="btn-new" class="btn btn-danger">New Game</button>
        <button id="btn-order" disabled="disabled" class="btn btn-primary">
          Order Letters
        </button>
        <button id="btn-stop" disabled="disabled" class="btn btn-primary">
          Stop Game
        </button>
      </div>
    </div>

    <div class="row container mt-2">
      <div class="col">
        <h1>Player 1- <small>0</small></h1>
        <div id="card-player" class="div-cards">
          <!-- <img class="carta" src="assets/cartas/10D.png" /> -->
        </div>
      </div>
    </div>

    <div class="row container mt-2">
      <div class="col">
        <h1>Computer - <small>0</small></h1>
        <div id="card-computer" class="div-cards">
          <!-- <img class="carta" src="assets/cartas/3D.png" /> -->
        </div>
      </div>
    </div>

    <script type="module" src="/main.js"></script>
  </body>
</html>
